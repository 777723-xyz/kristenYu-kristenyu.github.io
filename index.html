<!DOCTYPE html>
<script>
    let audioData = [
        {
            "name": "audio/audio2.mp3",
            "keywords": ["happy", "sad", "test"]
        },
        {
            "name": "audio/audio1.mp3",
            "keywords": ["love", "heartbreak"]
        }
    ]

    // Function to perform the search
    function performSearch(query) {
        const listContainer = document.getElementById("audio-list");
        listContainer.innerHTML = '';
        let matchedResults = [];
        matchedResults.length = 0;
        audioData.forEach((story, index) => {
            story["keywords"].forEach((keyword, index)=>{
                console.log(keyword)
                if(query.toLowerCase().trim() === keyword.toLowerCase().trim())
                {
                    matchedResults.push(index);
                }
            })
        
        });
    const ul = document.createElement('ul');
    matchedResults.forEach(index => {
        const li = document.createElement('li');
        const audio = document.createElement('audio');
        audio.controls = true;
        audio.src = audioData[index]["name"];
        li.appendChild(audio);
        listContainer.appendChild(li);
    })
    }

    document.addEventListener("DOMContentLoaded", function() {
        const searchInput = document.getElementById('search-input');
        // Event listener for search input
        searchInput.addEventListener('input', function() {
            performSearch(this.value);
        });
    })


</script>
